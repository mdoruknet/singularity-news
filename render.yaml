services:
  # 1. BACKEND (FastAPI API) — Ücretsiz katman
  # Not: Free plan'da kalıcı disk yoktur; servis hareketsizlikte uykuya geçer ve
  # yeniden başlayınca SQLite sıfırlanır. Haberleri yeniden doldurmak için
  # arayüzdeki "Yeni Baskı" butonu kullanılır.
  - type: web
    name: singularity-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SINGULARITY_DB
        value: singularity.db
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false # Render dashboard'dan manuel girilecek

  # 2. FRONTEND (React Static Site - ÜCRETSİZ)
  - type: web
    name: singularity-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: singularity-backend
          envVarKey: RENDER_EXTERNAL_URL
