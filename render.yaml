services:
  # 1. BACKEND (FastAPI API) — Ücretsiz katman
  # Not: Free plan'da kalıcı disk yoktur; servis hareketsizlikte uykuya geçer ve
  # yeniden başlayınca SQLite sıfırlanır. Haberleri yeniden doldurmak için
  # arayüzdeki "Yeni Baskı" butonu kullanılır.
  - type: web
    name: singularity-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    # Docker derleme bağlamı backend/ olmalı; aksi halde "COPY requirements.txt"
    # repo kökünde dosyayı bulamaz ve build başarısız olur.
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SINGULARITY_DB
        value: singularity.db
      - key: ALLOWED_ORIGINS
        value: "*"
      # Çeviri sağlayıcısı: "gemini" (varsayılan) veya "anthropic".
      - key: LLM_PROVIDER
        value: gemini
      # Google Gemini anahtarı (varsayılan çeviri sağlayıcısı).
      - key: GEMINI_API_KEY
        sync: false # Render dashboard'dan manuel girilecek
      # Anthropic anahtarı (yalnızca LLM_PROVIDER=anthropic ise gerekir, opsiyonel).
      - key: ANTHROPIC_API_KEY
        sync: false
      # POST /api/refresh gizli anahtarı (opsiyonel ama önerilir): tanımlıysa bu
      # uç "X-Refresh-Secret" / "Authorization: Bearer" başlığı ister; böylece
      # kötü niyetli tetiklemeler tarama+çeviri maliyetini şişiremez. Boşsa açık.
      - key: REFRESH_SECRET
        sync: false # Render dashboard'dan manuel girilecek (örn. uzun rastgele dize)

  # 2. FRONTEND (React Static Site - ÜCRETSİZ)
  - type: web
    name: singularity-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # SPA: client-side routing (react-router) için bilinmeyen yollar index.html'e
    # yönlendirilir; böylece /haber/:id gibi derin linkler yenilenince 404 olmaz.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: singularity-backend
          envVarKey: RENDER_EXTERNAL_URL
