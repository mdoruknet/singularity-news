<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singularity — Küresel Yapay Zeka Edisyonu</title>
    <meta
      name="description"
      content="Dünyadaki yapay zeka gelişmelerini bağlam temelli olarak gazetecilik diliyle Türkçeye çeviren prestijli haber platformu."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Blackletter (logo) + Playfair Display (manşet/gövde) + Inter (meta) -->
    <link
      href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tema, React yüklenmeden uygulanır (karanlık modda parlamayı önler) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("singularity:theme");
          if (!t) {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
