<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Singularity — Küresel Yapay Zeka Edisyonu</title>
    <!-- PWA / mobil native-app desteği -->
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Singularity" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta
      name="description"
      content="Dünyadaki yapay zeka gelişmelerini bağlam temelli olarak gazetecilik diliyle Türkçeye çeviren prestijli haber platformu."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Logo: Wall Street Journal tarzı yoğun gotik (blackletter) manşet —
         UnifrakturCook 700; 'S' ve 'y' net okunur. Manşet/gövde Playfair
         Display, meta Inter. -->
    <link
      href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,900&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tema, React yüklenmeden uygulanır (karanlık modda parlamayı önler) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("singularity:theme");
          if (!t) {
            t =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
