server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: bilinmeyen yolları index.html'e düşür (client-side routing uyumu)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash'li statik varlıkları uzun süre önbelleğe al
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Basit sağlık ucu
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
